name: Authelia
description: Authentication and authorization server (requires Redis)
commands:
  install:
    - docker pull authelia/authelia:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/authelia/config
    - mkdir -p ~/{{DATA_PATH}}/authelia/data
  run: |-
    docker run \
          -d \
          --name authelia \
          --network {{NETWORK_NAME}} \
          -p 9091:9091 \
          -v ~/{{DATA_PATH}}/authelia/config:/config \
          -v ~/{{DATA_PATH}}/authelia/data:/data \
          -e AUTHELIA_JWT_SECRET=homelab-jwt-secret-change-in-production \
          -e AUTHELIA_SESSION_SECRET=homelab-session-secret-change-in-production \
          -e AUTHELIA_STORAGE_ENCRYPTION_KEY=homelab-encryption-key-32chars \
          -e AUTHELIA_SESSION_REDIS_HOST=redis \
          -e AUTHELIA_SESSION_REDIS_PORT=6379 \
          authelia/authelia:latest
variables:
  - NETWORK_NAME
dependencies:
  - redis
