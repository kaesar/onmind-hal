name: Zrok
description: Zero-trust tunneling platform (NGROK alternative) with OpenZiti
commands:
  install:
    - docker pull openziti/zrok2:latest
    - docker pull openziti/ziti-controller:latest
    - docker pull openziti/ziti-router:latest
    - docker pull caddy:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/zrok/data
    - mkdir -p ~/{{DATA_PATH}}/zrok/caddy
    - mkdir -p ~/{{CONFIG_PATH}}/zrok
    - docker volume create zrok_controller_data
    - docker volume create ziti_controller_data
    - docker volume create ziti_router_data
    - |-
      cat > ~/{{CONFIG_PATH}}/zrok/Caddyfile << 'CADDY_EOF'
      :80 {
          reverse_proxy zrok-controller:18080
      }
      CADDY_EOF
    - |-
      cat > ~/{{CONFIG_PATH}}/zrok/controller.yaml << 'ZROK_EOF'
      v: 4
      admin:
        secrets:
          - {{ADMIN_TOKEN}}
      endpoint:
        host: 0.0.0.0
        port: 18080
      store:
        path: zrok.db
        type: sqlite3
      ziti:
        api_endpoint: https://ziti-controller:1280
        username: admin
        password: {{ADMIN_TOKEN}}
      ZROK_EOF
  run: |-
    docker run \
          -d \
          --name ziti-controller \
          --network {{NETWORK_NAME}} \
          -p 1280:1280 \
          -e ZITI_PWD={{ADMIN_TOKEN}} \
          -e ZITI_USER=admin \
          -e ZITI_CTRL_ADVERTISED_ADDRESS=ziti-controller \
          -e ZITI_BOOTSTRAP=true \
          -e ZITI_BOOTSTRAP_PKI=true \
          -e ZITI_BOOTSTRAP_CONFIG=true \
          -e ZITI_BOOTSTRAP_DATABASE=true \
          -e ZITI_BOOTSTRAP_CLUSTER=true \
          -e ZITI_CLUSTER_TRUST_DOMAIN=minilab \
          -e ZITI_CLUSTER_NODE_NAME=ctrl \
          -v ziti_controller_data:/var/lib/ziti-controller \
          --restart unless-stopped \
          openziti/ziti-controller:latest

    for i in $(seq 1 12); do
      docker exec ziti-controller ziti edge status 2>/dev/null && break
      echo "  Waiting for ziti-controller to be ready... ($i/12)"
      sleep 10
    done

    docker run \
          -d \
          --name ziti-router \
          --network {{NETWORK_NAME}} \
          -p 3022:3022 \
          -e ZITI_ROUTER_NAME=edge-router \
          -e ZITI_ROUTER_ADVERTISED_ADDRESS=ziti-router \
          -e ZITI_CTRL_ADVERTISED_ADDRESS=ziti-controller \
          -e ZITI_CTRL_ADVERTISED_PORT=1280 \
          -v ziti_router_data:/var/lib/ziti-router \
          --restart unless-stopped \
          openziti/ziti-router:latest

    docker run \
          -d \
          --name zrok-controller \
          --network {{NETWORK_NAME}} \
          -p 18080:18080 \
          -v ~/{{CONFIG_PATH}}/zrok/controller.yaml:/etc/zrok/controller.yaml \
          --restart unless-stopped \
          openziti/zrok2:latest controller /etc/zrok/controller.yaml

    docker run \
          -d \
          --name zrok-caddy \
          --network {{NETWORK_NAME}} \
          -p 8017:443 \
          -p 8015:80 \
          -v ~/{{CONFIG_PATH}}/zrok/Caddyfile:/etc/caddy/Caddyfile \
          -v ~/{{DATA_PATH}}/zrok/caddy:/data \
          --restart unless-stopped \
          caddy:latest
  postRun:
    - |
      docker exec ziti-controller sh -c 'ziti edge login localhost:1280 -u admin -p {{ADMIN_TOKEN}} -y 2>/dev/null; ziti edge create config-type zrok.proxy.v1 2>/dev/null; ziti edge create config zrok-proxy zrok.proxy.v1 "{\"address\": \"127.0.0.1\", \"port\": 0}" 2>/dev/null'
variables:
  - NETWORK_NAME
  - DOMAIN
  - ADMIN_TOKEN
ports:
  - "1280:1280"
  - "3022:3022"
  - "18080:18080"
  - "8015:80"
  - "8017:443"
volumes:
  - zrok_controller_data:/var/lib/zrok2-controller
  - ziti_controller_data:/var/lib/ziti-controller
  - ziti_router_data:/var/lib/ziti-router
  - ~/{{CONFIG_PATH}}/zrok/Caddyfile:/etc/caddy/Caddyfile
  - ~/{{DATA_PATH}}/zrok/caddy:/data
  - ~/{{CONFIG_PATH}}/zrok/controller.yaml:/etc/zrok/controller.yaml
accessUrl: https://zrok.{{DOMAIN}}
isCore: false
