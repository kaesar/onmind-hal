name: Zrok
description: Zero-trust tunneling platform (NGROK alternative) with OpenZiti
commands:
  install:
    - docker pull openziti/zrok2:latest
    - docker pull openziti/ziti-controller:latest
    - docker pull openziti/ziti-router:latest
    - docker pull caddy:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/zrok/data
    - mkdir -p ~/{{DATA_PATH}}/zrok/caddy
    - mkdir -p ~/{{CONFIG_PATH}}/zrok
    - docker volume create zrok_controller_data
    - docker volume create zrok_frontend_data
    - docker volume create ziti_controller_data
    - docker volume create ziti_router_data
  run: |-
    docker run \
          -d \
          --name ziti-controller \
          --network {{NETWORK_NAME}} \
          -p 1280:1280 \
          -e ZITI_PWD={{ADMIN_TOKEN}} \
          -e ZITI_USER=admin \
          -e ZITI_CTRL_ADVERTISED_ADDRESS=ziti-controller \
          -e ZITI_BOOTSTRAP_CLUSTER=false \
          -v ziti_controller_data:/var/lib/ziti-controller \
          --restart unless-stopped \
          openziti/ziti-controller:latest || true

    docker run \
          -d \
          --name ziti-router \
          --network {{NETWORK_NAME}} \
          -p 3022:3022 \
          -e ZITI_ROUTER_NAME=edge-router \
          -e ZITI_CTRL_ADVERTISED_HOST=ziti-controller \
          -e ZITI_CTRL_ADVERTISED_PORT=1280 \
          -v ziti_router_data:/var/lib/ziti-router \
          --restart unless-stopped \
          openziti/ziti-router:latest || true

    docker run \
          -d \
          --name zrok-controller \
          --network {{NETWORK_NAME}} \
          -p 18080:18080 \
          -e ZROK2_STORE_TYPE=sqlite3 \
          -e ZROK2_DNS_ZONE={{DOMAIN}} \
          -e ZROK2_ADMIN_TOKEN={{ADMIN_TOKEN}} \
          -e ZITI_API_ENDPOINT=https://ziti-controller:1280 \
          -e ZITI_ADMIN_PASSWORD={{ADMIN_TOKEN}} \
          -e ZROK2_CTRL_PORT=18080 \
          -e ZROK2_FRONTEND_PORT=8080 \
          -e ZROK2_INSECURE_INTERFACE=0.0.0.0 \
          -v zrok_controller_data:/var/lib/zrok2-controller \
          --restart unless-stopped \
          openziti/zrok2:latest controller start

    docker run \
          -d \
          --name zrok-frontend \
          --network {{NETWORK_NAME}} \
          -p 8013:8080 \
          -e ZROK2_FRONTEND_TOKEN={{ADMIN_TOKEN}} \
          -e ZROK2_CTRL_ENDPOINT=http://zrok-controller:18080 \
          -e ZROK2_FRONTEND_PORT=8080 \
          -e ZROK2_DNS_ZONE={{DOMAIN}} \
          -v zrok_frontend_data:/var/lib/zrok2-frontend \
          --restart unless-stopped \
          openziti/zrok2:latest frontend start

    docker run \
          -d \
          --name zrok-caddy \
          --network {{NETWORK_NAME}} \
          -p 8017:443 \
          -p 8015:80 \
          -v ~/{{CONFIG_PATH}}/zrok/Caddyfile:/etc/caddy/Caddyfile \
          -v ~/{{DATA_PATH}}/zrok/caddy:/data \
          --restart unless-stopped \
          caddy:latest || true
variables:
  - NETWORK_NAME
  - DOMAIN
  - ADMIN_TOKEN
ports:
  - "1280:1280"
  - "3022:3022"
  - "18080:18080"
  - "8013:8080"
  - "8015:80"
  - "8017:443"
volumes:
  - zrok_controller_data:/var/lib/zrok2-controller
  - zrok_frontend_data:/var/lib/zrok2-frontend
  - ziti_controller_data:/var/lib/ziti-controller
  - ziti_router_data:/var/lib/ziti-router
  - ~/{{CONFIG_PATH}}/zrok/Caddyfile:/etc/caddy/Caddyfile
  - ~/{{DATA_PATH}}/zrok/caddy:/data
environment:
  ZITI_PWD: "{{ADMIN_TOKEN}}"
  ZITI_USER: "admin"
  ZITI_ROUTER_NAME: "edge-router"
  ZITI_CTRL_ADVERTISED_HOST: "ziti-controller"
  ZITI_CTRL_ADVERTISED_PORT: "1280"
  ZITI_CTRL_ADVERTISED_ADDRESS: "ziti-controller"
  ZROK2_STORE_TYPE: "sqlite3"
  ZROK2_DNS_ZONE: "{{DOMAIN}}"
  ZROK2_ADMIN_TOKEN: "{{ADMIN_TOKEN}}"
  ZITI_API_ENDPOINT: "https://ziti-controller:1280"
  ZITI_ADMIN_PASSWORD: "{{ADMIN_TOKEN}}"
  ZROK2_CTRL_PORT: "18080"
  ZROK2_FRONTEND_PORT: "8080"
  ZROK2_INSECURE_INTERFACE: "0.0.0.0"
  ZROK2_FRONTEND_TOKEN: "{{ADMIN_TOKEN}}"
  ZROK2_CTRL_ENDPOINT: "http://zrok-controller:18080"
accessUrl: https://zrok.{{DOMAIN}}
isCore: false