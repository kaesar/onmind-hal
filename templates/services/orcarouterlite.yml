name: OrcaRouter Lite
description: Lightweight LLM router with multi-provider support and API key management
commands:
  install:
    - docker pull python:3.12-slim
  setup:
    - mkdir -p ~/{{DATA_PATH}}/orcarouter/data
    - git clone --depth=1 https://github.com/Continuum-AI-Corp/OrcaRouter-Lite.git ~/{{DATA_PATH}}/orcarouter/repo 2>/dev/null || true
    - cp templates/dockerfiles/orcarouterlite.dockerfile ~/{{DATA_PATH}}/orcarouter/repo/Dockerfile
    - cd ~/{{DATA_PATH}}/orcarouter/repo && docker build -t orcarouter-lite:latest .
  run: |-
    docker rm -f orcarouterlite 2>/dev/null; docker run \
          -d \
          --name orcarouterlite \
          --network {{NETWORK_NAME}} \
          -p 8000:8000 \
          -e DATABASE_URL=sqlite+aiosqlite:////data/orca.db \
          -e CREDENTIAL_ENCRYPTION_KEY={{ADMIN_TOKEN}} \
          -e API_KEY_PEPPER={{ADMIN_TOKEN}} \
          -e OPENAI_API_KEY= \
          -v orcarouter_data:/data \
          orcarouter-lite:latest
variables:
  - NETWORK_NAME
  - ADMIN_TOKEN
ports:
  - "8000:8000"
volumes:
  - orcarouter_data:/data
environment:
  DATABASE_URL: "sqlite+aiosqlite:////data/orca.db"
  CREDENTIAL_ENCRYPTION_KEY: "{{ADMIN_TOKEN}}"
  API_KEY_PEPPER: "{{ADMIN_TOKEN}}"
  OPENAI_API_KEY: ""
accessUrl: https://orcarouter.{{DOMAIN}}/v1
dependencies: []
isCore: false