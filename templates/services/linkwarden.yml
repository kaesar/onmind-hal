name: Linkwarden
description: Self-hosted bookmark manager with tagging and archiving
commands:
  install:
    - docker pull ghcr.io/linkwarden/linkwarden:latest
  setup:
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='linkwarden'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE USER linkwarden WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -c "ALTER USER linkwarden WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='linkwarden'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE DATABASE linkwarden OWNER linkwarden;"
    - docker volume create linkwarden_data
  run: |-
    docker rm -f linkwarden 2>/dev/null; docker run \
          -d \
          --name linkwarden \
          --network {{NETWORK_NAME}} \
          -p 3101:3000 \
          -v linkwarden_data:/data/data \
          -e DATABASE_URL=postgresql://linkwarden:{{STORAGE_PASSWORD}}@postgresql:5432/linkwarden \
          -e NEXTAUTH_SECRET={{STORAGE_PASSWORD}} \
          -e NEXTAUTH_URL=https://linkwarden.{{DOMAIN}} \
          --restart unless-stopped \
          ghcr.io/linkwarden/linkwarden:latest
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
  - DOMAIN
dependencies:
  - postgresql
