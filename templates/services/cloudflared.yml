name: Cloudflare Tunnel
description: Secure tunnel to expose services without opening ports
commands:
  install:
    - docker pull cloudflare/cloudflared:latest
  setup:
    - mkdir -p ~/{{CONFIG_PATH}}/cloudflared
    - |
      if [ ! -f ~/{{CONFIG_PATH}}/cloudflared/config.yml ]; then
        echo ""
        echo "==============================================="
        echo " Cloudflare Tunnel"
        echo "==============================================="
        echo "Container will start in quick tunnel mode"
        echo "pointing to Caddy (http://caddy:80)."
        echo ""
        echo "For a permanent tunnel with local config:"
        echo "1. Create a tunnel in Cloudflare Zero Trust"
        echo "2. Download the tunnel credentials JSON file"
        echo "3. Copy it to: ~/{{CONFIG_PATH}}/cloudflared/"
        echo "4. Update config.yml with your tunnel ID"
        echo "5. Restart: docker restart cloudflared"
        echo ""
        echo "Or run the setup script for guided configuration:"
        echo "  bash scripts/setup-cloudflared.sh"
        echo "==============================================="
      fi
  run: |-
    if [ -f ~/{{CONFIG_PATH}}/cloudflared/config.yml ]; then
      docker run -d \
        --name cloudflared \
        --network {{NETWORK_NAME}} \
        -v ~/{{CONFIG_PATH}}/cloudflared:/etc/cloudflared \
        --restart unless-stopped \
        cloudflare/cloudflared:latest \
        tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    else
      docker run -d \
        --name cloudflared \
        --network {{NETWORK_NAME}} \
        -v ~/{{CONFIG_PATH}}/cloudflared:/etc/cloudflared \
        --restart unless-stopped \
        cloudflare/cloudflared:latest \
        tunnel --no-autoupdate run --url http://caddy:80
    fi
variables:
  - NETWORK_NAME
  - CONFIG_PATH
dependencies:
  - Caddy
