name: Cloudflare Tunnel
description: Secure tunnel to expose services without opening ports
commands:
  install:
    - docker pull cloudflare/cloudflared:latest
  setup:
    - mkdir -p ~/.cloudflared
    - echo ""
    - echo "==================================="
    - echo " Cloudflare Tunnel Setup Required"
    - echo "==================================="
    - echo "Run the setup script to configure the tunnel:"
    - echo "  cd hal && bash scripts/setup-cloudflared.sh"
    - echo ""
  run: |-
    docker run \
          -d \
          --name cloudflared \
          --network {{NETWORK_NAME}} \
          -v ~/.cloudflared:/etc/cloudflared \
          --restart unless-stopped \
          cloudflare/cloudflared:latest tunnel --no-autoupdate run
variables:
  - NETWORK_NAME
dependencies: []
