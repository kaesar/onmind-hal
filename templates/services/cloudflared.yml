name: Cloudflare Tunnel
description: Secure tunnel to expose services without opening ports
commands:
  install:
    - docker pull cloudflare/cloudflared:latest
  setup:
    - mkdir -p ~/.cloudflared
    - |
      if [ ! -f ~/.cloudflared/token ]; then
        echo ""
        echo "==============================================="
        echo " Cloudflare Tunnel"
        echo "==============================================="
        echo "Container will start in quick tunnel mode"
        echo "pointing to Caddy (http://caddy:80)."
        echo ""
        echo "For a permanent tunnel with custom domain:"
        echo "1. Create a tunnel in Cloudflare Zero Trust"
        echo "2. Copy the tunnel token (CF-Connector-...)"
        echo "3. Save it:"
        echo "   echo '\''<TOKEN>'\'' > ~/.cloudflared/token"
        echo "4. Restart: docker restart cloudflared"
        echo ""
        echo "Or run the setup script for guided configuration:"
        echo "  bash scripts/setup-cloudflared.sh"
        echo "==============================================="
      fi
  run: |-
    if [ -f ~/.cloudflared/token ]; then
      TUNNEL_TOKEN=$(cat ~/.cloudflared/token)
      docker run -d \
        --name cloudflared \
        --network {{NETWORK_NAME}} \
        -v ~/.cloudflared:/etc/cloudflared \
        --restart unless-stopped \
        cloudflare/cloudflared:latest \
        tunnel --no-autoupdate run --token "$TUNNEL_TOKEN"
    else
      docker run -d \
        --name cloudflared \
        --network {{NETWORK_NAME}} \
        -v ~/.cloudflared:/etc/cloudflared \
        --restart unless-stopped \
        cloudflare/cloudflared:latest \
        tunnel --no-autoupdate --url http://caddy:80
    fi
variables:
  - NETWORK_NAME
dependencies:
  - Caddy
