name: caddy-service
description: Caddy reverse proxy service
commands:
  install:
    - docker pull caddy:latest
  setup:
    - docker network create {{NETWORK_NAME}} || true
    - mkdir -p ~/{{CONFIG_PATH}}
    - mkdir -p ~/{{DATA_PATH}}/caddy
  run: |-
    docker run \
          -d \
          --name caddy \
          --network {{NETWORK_NAME}} \
          -p 80:80 \
          -p 443:443 \
          -v ~/{{CONFIG_PATH}}/Caddyfile:/etc/caddy/Caddyfile \
          -v ~/{{DATA_PATH}}/caddy:/data caddy:latest
variables:
  - NETWORK_NAME
ports:
  - "80:80"
  - "443:443"
volumes:
  - ~/{{CONFIG_PATH}}/Caddyfile:/etc/caddy/Caddyfile
  - ~/{{DATA_PATH}}/caddy:/data
configFiles:
  - Caddyfile
accessUrl: https://{{DOMAIN}}
dependencies: []
isCore: true
