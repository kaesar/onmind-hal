name: Cal.com
description: Open-source scheduling platform (Calendly alternative)

commands:
  install:
    - docker pull calcom/cal.com:latest
  setup:
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='calcom'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE USER calcom WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -c "ALTER USER calcom WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='calcom'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE DATABASE calcom OWNER calcom;"
    - docker volume create calcom_data
  run: |
    docker run -d \
      --name calcom \
      --network {{NETWORK_NAME}} \
      -p 3040:3000 \
      -v calcom_data:/calcom/apps/web/.next \
      -e DATABASE_URL=postgresql://calcom:{{STORAGE_PASSWORD}}@postgresql:5432/calcom \
      -e NEXTAUTH_SECRET={{STORAGE_PASSWORD}} \
      -e NEXTAUTH_URL=https://cal.{{DOMAIN}} \
      -e CALENDSO_ENCRYPTION_KEY={{STORAGE_PASSWORD}} \
      -e NEXT_PUBLIC_WEBAPP_URL=https://cal.{{DOMAIN}} \
      --restart=always \
      calcom/cal.com:latest

variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
  - DOMAIN

dependencies:
  - PostgreSQL
