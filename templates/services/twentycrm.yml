name: twentycrm-service
description: TwentyCRM - Modern open-source CRM platform
commands:
  install:
    - docker pull twentycrm/twenty:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/twentycrm
    - docker exec postgresql psql -U root -c "CREATE USER twentycrm WITH PASSWORD '{{STORAGE_PASSWORD}}';" 2>/dev/null || true
    - docker exec postgresql psql -U root -c "CREATE DATABASE twenty OWNER twentycrm;" 2>/dev/null || true
  run: |-
    docker run \
          -d \
          --name twentycrm \
          --network {{NETWORK_NAME}} \
          -p 3021:3000 \
          --restart unless-stopped \
          -e PG_DATABASE_URL=postgres://twentycrm:{{STORAGE_PASSWORD}}@postgresql:5432/twenty \
          -e REDIS_URL=redis://redis:6379 \
          -e SERVER_URL=https://crm.{{DOMAIN}} \
          -e FRONT_BASE_URL=https://crm.{{DOMAIN}} \
          -e REACT_APP_SERVER_BASE_URL=https://crm.{{DOMAIN}} \
          twentycrm/twenty:latest
variables:
  - NETWORK_NAME
  - DOMAIN
  - STORAGE_PASSWORD
ports:
  - "3021:3000"
volumes:
  - ~/{{DATA_PATH}}/twentycrm:/app/.local-storage
accessUrl: https://crm.{{DOMAIN}}
dependencies:
  - PostgreSQL
  - Redis
isCore: false
