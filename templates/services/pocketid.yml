name: pocketid-service
description: PocketID OIDC provider with passkeys support
commands:
  install:
    - docker pull ghcr.io/pocket-id/pocket-id:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/pocketid
    - |
      if [ ! -f ~/{{DATA_PATH}}/pocketid/encryption.key ]; then
        openssl rand -hex 16 > ~/{{DATA_PATH}}/pocketid/encryption.key
      fi
  run: |-
    docker run \
          -d \
          --name pocketid \
          --network {{NETWORK_NAME}} \
          -p 8093:80 \
          -e PUBLIC_APP_URL=https://pocketid.{{DOMAIN}} \
          -e ENCRYPTION_KEY=$(cat ~/{{DATA_PATH}}/pocketid/encryption.key) \
          -v ~/{{DATA_PATH}}/pocketid:/app/backend/data \
          ghcr.io/pocket-id/pocket-id:latest
variables:
  - NETWORK_NAME
  - DOMAIN
ports:
  - "8093:80"
volumes:
  - ~/{{DATA_PATH}}/pocketid:/app/backend/data
accessUrl: https://pocketid.{{DOMAIN}}
dependencies: []
isCore: false
