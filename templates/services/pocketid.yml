name: pocketid-service
description: PocketID OIDC provider with passkeys support
commands:
  install:
    - docker pull node:20-alpine
  setup:
    - mkdir -p ~/{{DATA_PATH}}/pocketid
    - docker build -f templates/dockerfiles/pocketid.dockerfile -t pocketid:latest .
  run: |-
    docker run \
          -d \
          --name pocketid \
          --network {{NETWORK_NAME}} \
          -p 8093:80 \
          -e PUBLIC_APP_URL=https://auth.{{DOMAIN}} \
          -e ENCRYPTION_KEY=CHANGEME_REPLACE_WITH_32_CHAR_HEX_KEY \
          -v ~/{{DATA_PATH}}/pocketid:/app/backend/data \
          pocketid:latest
variables:
  - NETWORK_NAME
  - DOMAIN
ports:
  - "8093:80"
volumes:
  - ~/{{DATA_PATH}}/pocketid:/app/backend/data
accessUrl: https://auth.{{DOMAIN}}
dependencies: []
isCore: false
