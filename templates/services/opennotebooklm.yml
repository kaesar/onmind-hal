name: opennotebooklm-service
description: Open-source alternative to Google NotebookLM
commands:
  install:
    - docker pull python:3.12-slim
    - docker pull surrealdb/surrealdb:v2
  setup:
    - mkdir -p ~/{{DATA_PATH}}/opennotebooklm
    - docker volume create surrealdb_data
    - docker run --rm -v surrealdb_data:/mydata alpine:latest chown -R 65532:65532 /mydata
    - docker build -f templates/dockerfiles/opennotebooklm.dockerfile -t opennotebooklm:latest .
  run: |-
    docker run \
          -d \
          --name surrealdb \
          --network {{NETWORK_NAME}} \
          -p 8001:8000 \
          -e SURREAL_EXPERIMENTAL_GRAPHQL=true \
          -v surrealdb_data:/mydata \
          --restart unless-stopped \
          surrealdb/surrealdb:v2 start --log info --user root --pass root rocksdb:/mydata/mydatabase.db && docker run \
          -d \
          --name opennotebooklm \
          --network {{NETWORK_NAME}} \
          -p 3091:8502 \
          -e OPENAI_API_KEY=${OPENAI_API_KEY:-} \
          -e SURREAL_URL=ws://surrealdb:8000/rpc \
          -e SURREAL_USER=root \
          -e SURREAL_PASSWORD=root \
          -e SURREAL_NAMESPACE=open_notebook \
          -e SURREAL_DATABASE=open_notebook \
           -e OPEN_NOTEBOOK_ENCRYPTION_KEY={{ADMIN_TOKEN}} \
          -v ~/{{DATA_PATH}}/opennotebooklm:/app/data \
          opennotebooklm:latest
variables:
  - NETWORK_NAME
  - DOMAIN
  - ADMIN_TOKEN
ports:
  - "8001:8000"
  - "3091:8502"
volumes:
  - surrealdb_data
  - ~/{{DATA_PATH}}/opennotebooklm:/app/data
accessUrl: https://notebook.{{DOMAIN}}
dependencies:
  - surrealdb
isCore: false
