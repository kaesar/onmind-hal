name: OneDev
description: Self-hosted Git server with CI/CD
commands:
  install:
    - docker pull 1dev/server:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/onedev/data
  run: |-
    docker run \
          -d \
          --name onedev \
          --network {{NETWORK_NAME}} \
          -p 6610:6610 \
          -p 6611:6611 \
          -v ~/{{DATA_PATH}}/onedev/data:/opt/onedev \
          -v {{DOCKER_SOCKET_PATH}}:/var/run/docker.sock \
          1dev/server:latest
variables:
  - NETWORK_NAME
  - DOCKER_SOCKET_PATH
dependencies: []
