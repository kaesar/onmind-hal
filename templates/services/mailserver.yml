name: Docker Mailserver
description: Full-featured mail server (SMTP, IMAP, POP3, antispam, antivirus)
commands:
  install:
    - docker pull docker.io/mailserver/docker-mailserver:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/mailserver/data
    - mkdir -p ~/{{DATA_PATH}}/mailserver/state
    - mkdir -p ~/{{DATA_PATH}}/mailserver/logs
    - mkdir -p ~/{{DATA_PATH}}/mailserver/config
  run: |-
    docker run \
          -d \
          --name mailserver \
          --network {{NETWORK_NAME}} \
          -p 25:25 \
          -p 143:143 \
          -p 587:587 \
          -p 993:993 \
          -v ~/{{DATA_PATH}}/mailserver/data:/var/mail \
          -v ~/{{DATA_PATH}}/mailserver/state:/var/mail-state \
          -v ~/{{DATA_PATH}}/mailserver/logs:/var/log/mail \
          -v ~/{{DATA_PATH}}/mailserver/config:/tmp/docker-mailserver \
          -e ENABLE_SPAMASSASSIN=1 \
          -e ENABLE_CLAMAV=1 \
          -e ENABLE_FAIL2BAN=1 \
          --hostname mail.{{DOMAIN}} \
          --restart unless-stopped docker.io/mailserver/docker-mailserver:latest
  postRun:
    - |
      FOUND=0
      for i in $(seq 1 30); do
        if docker exec mailserver pgrep dovecot >/dev/null 2>&1; then
          FOUND=1
          break
        fi
        echo "  Waiting for mailserver to initialize... ($i/30)"
        sleep 10
      done
      if [ "$FOUND" = "0" ]; then
        echo "  ⚠️  Dovecot not detected after 5 minutes"
        echo "  💡 The mailserver may still be starting up (ClamAV first-run downloads)"
        echo "  💡 Run manually later: printf '%s\n%s\n' '{{MAIL_PASSWORD}}' '{{MAIL_PASSWORD}}' | docker exec -i mailserver setup email add {{MAIL_USER}}"
        exit 0
      fi
      printf "%s\n%s\n" "{{MAIL_PASSWORD}}" "{{MAIL_PASSWORD}}" | docker exec -i mailserver setup email add {{MAIL_USER}}
variables:
  - NETWORK_NAME
  - DOMAIN
  - MAIL_USER
  - MAIL_PASSWORD
dependencies: []
