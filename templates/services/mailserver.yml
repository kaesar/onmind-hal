name: Docker Mailserver
description: Full-featured mail server (SMTP, IMAP, POP3, antispam, antivirus)
commands:
  install:
    - docker pull docker.io/mailserver/docker-mailserver:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/mailserver/data
    - mkdir -p ~/{{DATA_PATH}}/mailserver/state
    - mkdir -p ~/{{DATA_PATH}}/mailserver/logs
    - mkdir -p ~/{{DATA_PATH}}/mailserver/config
    - printf "%s\n%s\n" "{{MAIL_PASSWORD}}" "{{MAIL_PASSWORD}}" | docker run --rm -i -v ~/{{DATA_PATH}}/mailserver/config:/tmp/docker-mailserver docker.io/mailserver/docker-mailserver:latest setup email add {{MAIL_USER}}
  run: |-
    docker run \
          -d \
          --name mailserver \
          --network {{NETWORK_NAME}} \
          -p 25:25 \
          -p 143:143 \
          -p 587:587 \
          -p 993:993 \
          -v ~/{{DATA_PATH}}/mailserver/data:/var/mail \
          -v ~/{{DATA_PATH}}/mailserver/state:/var/mail-state \
          -v ~/{{DATA_PATH}}/mailserver/logs:/var/log/mail \
          -v ~/{{DATA_PATH}}/mailserver/config:/tmp/docker-mailserver \
          -e ENABLE_SPAMASSASSIN=1 \
          -e ENABLE_CLAMAV=1 \
          -e ENABLE_FAIL2BAN=1 \
          --hostname mail.{{DOMAIN}} \
          --restart unless-stopped docker.io/mailserver/docker-mailserver:latest
variables:
  - NETWORK_NAME
  - DOMAIN
  - MAIL_USER
  - MAIL_PASSWORD
dependencies: []
