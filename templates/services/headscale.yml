name: Headscale
description: Self-hosted VPN server (Tailscale control server) with WireGuard
commands:
  install:
    - docker pull headscale/headscale:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/headscale
    - mkdir -p ~/{{CONFIG_PATH}}/headscale
    - |-
      cat > ~/{{CONFIG_PATH}}/headscale/config.yaml << 'HEADSCALE_EOF'
      server_url: https://headscale.{{DOMAIN}}
      listen_addr: 0.0.0.0:8019
      private_key_path: /var/lib/headscale/private.key
      noise:
        private_key_path: /var/lib/headscale/noise_private.key
      prefixes:
        v4: 100.64.0.0/10
        v6: fd7a:115c:a1e0::/48
      derp:
        server:
          enabled: true
          region_id: 999
          region_code: "headscale"
          region_name: "Headscale Embedded DERP"
          stun_listen_addr: "0.0.0.0:3478"
          private_key_path: /var/lib/headscale/derp_server_private.key
        urls:
          - https://controlplane.tailscale.com/derpmap/default
        paths: []
        auto_update_enabled: true
      dns:
        magic_dns: true
        base_domain: tailnet.{{DOMAIN}}
        override_local_dns: true
        nameservers:
          global:
            - 1.1.1.1
            - 8.8.8.8
      database:
        type: sqlite
        sqlite:
          path: /var/lib/headscale/db.sqlite
      log:
        level: info
      HEADSCALE_EOF
  run: |-
    docker run -d \
          --name headscale \
          --network {{NETWORK_NAME}} \
          -p 8019:8019 \
          -p 3478:3478/udp \
          -v ~/{{CONFIG_PATH}}/headscale/config.yaml:/etc/headscale/config.yaml:ro \
          -v ~/{{DATA_PATH}}/headscale:/var/lib/headscale \
          --restart unless-stopped \
          headscale/headscale:latest serve
  postRun:
    - |
      for i in $(seq 1 6); do
        docker exec headscale namespaces create default 2>/dev/null && break
        echo "  Waiting for Headscale to be ready... ($i/6)"
        sleep 5
      done
variables:
  - NETWORK_NAME
  - DOMAIN
  - DATA_PATH
  - CONFIG_PATH
ports:
  - "8019:8019"
  - "3478:3478/udp"
volumes:
  - ~/{{DATA_PATH}}/headscale:/var/lib/headscale
  - ~/{{CONFIG_PATH}}/headscale/config.yaml:/etc/headscale/config.yaml:ro
accessUrl: https://headscale.{{DOMAIN}}
dependencies: []
isCore: false
