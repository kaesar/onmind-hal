name: copyparty-service
description: Copyparty file sharing service
commands:
  install:
    - docker pull copyparty/ac:latest
  setup:
    - mkdir -p ~/{{CONFIG_PATH}}
    - mkdir -p ~/{{DATA_PATH}}/copyparty
  run: |-
    docker run \
          -d \
          --name copyparty \
          --network {{NETWORK_NAME}} \
          -p 3923:3923 \
          -v ~/{{DATA_PATH}}/copyparty:/w \
          -v ~/{{CONFIG_PATH}}:/cfg \
          copyparty/ac:latest
variables:
  - NETWORK_NAME
  - DOMAIN
ports:
  - "3923:3923"
volumes:
  - ~/{{DATA_PATH}}/copyparty:/w
  - ~/{{CONFIG_PATH}}:/cfg
accessUrl: https://files.{{DOMAIN}}
dependencies: []
isCore: true
