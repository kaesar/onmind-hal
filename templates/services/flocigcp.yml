name: Floci-GCP Emulator
description: GCP service emulator for local development
commands:
  install:
    - docker pull floci/floci-gcp:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/floci-gcp/data
    - docker volume create floci_gcp_data
  run: |-
    docker run \
          -d \
          --name flocigcp \
          --network {{NETWORK_NAME}} \
          -p 4568:4566 \
          -v {{DOCKER_SOCKET_PATH}}:/var/run/docker.sock \
          -v floci_gcp_data:/app/data \
          -e FLOCI_HOSTNAME=flocigcp \
          -e FLOCI_STORAGE_MODE=persistent \
          -e FLOCI_STORAGE_PERSISTENT_PATH=/app/data \
          -e FLOCI_SERVICES_DOCKER_NETWORK={{NETWORK_NAME}} \
          floci/floci-gcp:latest
variables:
  - NETWORK_NAME
  - DOCKER_SOCKET_PATH
ports:
  - "4568:4566"
volumes:
  - /var/run/docker.sock:/var/run/docker.sock
  - floci_gcp_data:/app/data
environment:
  FLOCI_HOSTNAME: "flocigcp"
  FLOCI_STORAGE_MODE: "persistent"
  FLOCI_STORAGE_PERSISTENT_PATH: "/app/data"
  FLOCI_SERVICES_DOCKER_NETWORK: "{{NETWORK_NAME}}"
accessUrl: http://flocigcp.{{DOMAIN}}:4568
dependencies: []
isCore: false
