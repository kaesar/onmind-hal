name: locust-service
description: Locust - Open source load testing tool (K6/JMeter alternative)
commands:
  install:
    - docker pull locustio/locust:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/locust
  run: |-
    docker run \
          -d \
          --name locust \
          --network {{NETWORK_NAME}} \
          -p 8099:8089 \
          -v ~/{{DATA_PATH}}/locust:/mnt/locust \
          locustio/locust:latest \
          -f /mnt/locust/locustfile.py --web-host 0.0.0.0
variables:
  - NETWORK_NAME
  - DOMAIN
ports:
  - "8099:8089"
volumes:
  - ~/{{DATA_PATH}}/locust:/home/locust
accessUrl: https://locust.{{DOMAIN}}
dependencies: []
isCore: false
