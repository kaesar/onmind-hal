name: LibreTranslate
description: Free and open source machine translation API
commands:
  install:
    - docker pull libretranslate/libretranslate:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/libretranslate/data
  run: |-
    docker run \
          -d \
          --name libretranslate \
          --network {{NETWORK_NAME}} \
          -p 5001:5000 \
          -v ~/{{DATA_PATH}}/libretranslate/data:/app/db \
          -e LT_DISABLE_WEB_UI=false \
          -e LT_UPDATE_MODELS=true \
          libretranslate/libretranslate:latest
variables:
  - NETWORK_NAME
dependencies: []
