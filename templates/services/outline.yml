name: Outline
description: Team knowledge base and wiki (requires PostgreSQL and Redis)
commands:
  install:
    - docker pull outlinewiki/outline:latest
  setup:
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='outline'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE USER outline WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -c "ALTER USER outline WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='outline'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE DATABASE outline OWNER outline;"
    - mkdir -p ~/{{DATA_PATH}}/outline/data
  run: |-
    docker run \
          -d \
          --name outline \
          --network {{NETWORK_NAME}} \
          -p 3030:3000 \
          -v ~/{{DATA_PATH}}/outline/data:/var/lib/outline/data \
          -e SECRET_KEY={{SECRET_KEY}} \
          -e UTILS_SECRET={{UTILS_SECRET}} \
          -e DATABASE_URL=postgres://outline:{{STORAGE_PASSWORD}}@postgresql:5432/outline \
          -e PGSSLMODE=disable \
          -e REDIS_URL=redis://redis:6379 \
          -e URL=https://outline.{{DOMAIN}} \
          -e PORT=3000 \
          outlinewiki/outline:latest
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
  - DOMAIN
  - SECRET_KEY
  - UTILS_SECRET
dependencies:
  - postgresql
  - redis
