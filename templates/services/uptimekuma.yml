name: Uptime Kuma Monitoring
description: Self-hosted uptime monitoring tool
commands:
  install:
    - docker pull louislam/uptime-kuma:latest
  setup:
    - docker volume create uptimekuma_data
  run: |-
    docker run \
          -d \
          --name uptimekuma \
          --network {{NETWORK_NAME}} \
          -p 3003:3001 \
          -v uptimekuma_data:/app/data \
          --restart=always \
          louislam/uptime-kuma:latest
variables:
  - NETWORK_NAME
dependencies: []
