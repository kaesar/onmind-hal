name: Kurrier
description: Self-hosted email marketing and newsletter platform
commands:
  install:
    - docker pull ghcr.io/kurrier/kurrier:latest
  setup:
    - mkdir -p ~/{{CONFIG_PATH}}/kurrier
    - docker volume create kurrier_data
  run: |-
    docker run \
          -d \
          --name kurrier \
          --network {{NETWORK_NAME}} \
          -p 3031:3000 \
          -v ~/{{CONFIG_PATH}}/kurrier:/app/config \
          -v kurrier_data:/app/data \
          -e DATABASE_URL=sqlite:///app/data/kurrier.db \
          -e NODE_ENV=production \
          --restart unless-stopped \
          ghcr.io/kurrier/kurrier:latest
variables:
  - NETWORK_NAME
dependencies: []
