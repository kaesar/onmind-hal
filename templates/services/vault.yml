name: HashiCorp Vault
description: Secrets and encryption management
commands:
  install:
    - docker pull hashicorp/vault:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/vault/data
    - mkdir -p ~/{{DATA_PATH}}/vault/config
  run: |-
    docker run \
          -d \
          --name vault \
          --network {{NETWORK_NAME}} \
          -p 8200:8200 \
          -v ~/{{DATA_PATH}}/vault/data:/vault/data \
          -v ~/{{DATA_PATH}}/vault/config:/vault/config \
          -e VAULT_DEV_ROOT_TOKEN_ID=homelab-root-token \
          -e VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200 \
          --cap-add=IPC_LOCK hashicorp/vault:latest server \
          -dev
variables:
  - NETWORK_NAME
dependencies: []
