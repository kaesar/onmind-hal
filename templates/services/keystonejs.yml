name: KeystoneJS CMS
description: Modern headless CMS and GraphQL API
commands:
  install:
    - docker pull node:18-slim
  setup:
    - mkdir -p ~/{{DATA_PATH}}/keystonejs
    - mkdir -p ~/{{DATA_PATH}}/keystonejs-build
    - cp templates/dockerfiles/keystonejs.dockerfile ~/{{DATA_PATH}}/keystonejs-build/Dockerfile
    - cp templates/dockerfiles/keystonejs-package.json ~/{{DATA_PATH}}/keystonejs-build/package.json
    - cp templates/dockerfiles/keystonejs-keystone.ts ~/{{DATA_PATH}}/keystonejs-build/keystone.ts
    - cp templates/dockerfiles/keystonejs-schema.ts ~/{{DATA_PATH}}/keystonejs-build/schema.ts
    - cp templates/dockerfiles/keystonejs-auth.ts ~/{{DATA_PATH}}/keystonejs-build/auth.ts
    - cd ~/{{DATA_PATH}}/keystonejs-build && docker build -t keystonejs:latest .
  run: |-
    docker run \
          -d \
          --name keystonejs \
          --network {{NETWORK_NAME}} \
          -p 3090:3000 \
          -e DATABASE_URL=postgresql://postgres:{{STORAGE_PASSWORD}}@postgresql:5432/keystonejs \
          -v ~/{{DATA_PATH}}/keystonejs:/app/data keystonejs:latest
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
dependencies:
  - postgresql
