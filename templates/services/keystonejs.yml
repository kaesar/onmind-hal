name: KeystoneJS CMS
description: Modern headless CMS and GraphQL API
commands:
  install:
    - docker pull node:18-slim
  setup:
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='keystonejs'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE USER keystonejs WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -c "ALTER USER keystonejs WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='keystonejs'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE DATABASE keystonejs OWNER keystonejs;"
    - mkdir -p ~/{{DATA_PATH}}/keystonejs
    - mkdir -p ~/{{DATA_PATH}}/keystonejs-build
    - cp templates/dockerfiles/keystonejs.dockerfile ~/{{DATA_PATH}}/keystonejs-build/Dockerfile
    - cp templates/dockerfiles/keystonejs-package.json ~/{{DATA_PATH}}/keystonejs-build/package.json
    - cp templates/dockerfiles/keystonejs-keystone.ts ~/{{DATA_PATH}}/keystonejs-build/keystone.ts
    - cp templates/dockerfiles/keystonejs-schema.ts ~/{{DATA_PATH}}/keystonejs-build/schema.ts
    - cp templates/dockerfiles/keystonejs-auth.ts ~/{{DATA_PATH}}/keystonejs-build/auth.ts
    - cd ~/{{DATA_PATH}}/keystonejs-build && docker build -t keystonejs:latest .
  run: |-
    docker run \
          -d \
          --name keystonejs \
          --network {{NETWORK_NAME}} \
          -p 3090:3000 \
          -e DATABASE_URL=postgresql://keystonejs:{{STORAGE_PASSWORD}}@postgresql:5432/keystonejs \
          -v ~/{{DATA_PATH}}/keystonejs:/app/data keystonejs:latest
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
dependencies:
  - postgresql
