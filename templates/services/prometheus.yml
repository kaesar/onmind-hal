name: Prometheus
description: Open-source systems monitoring and alerting toolkit
commands:
  install:
    - docker pull prom/prometheus:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/prometheus
    - |-
      cat > ~/{{DATA_PATH}}/prometheus/prometheus.yml << 'EOF'
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']

        - job_name: 'node-exporter'
          static_configs:
            - targets: ['node-exporter:9100']

        - job_name: 'cadvisor'
          static_configs:
            - targets: ['cadvisor:8080']
      EOF
    - |-
      cat > ~/{{DATA_PATH}}/prometheus/alert-rules.yml << 'EOF'
      groups:
        - name: homelab
          rules:
            - alert: ContainerDown
              expr: absent(container_last_seen{name=~".+"})
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Container {{ $labels.name }} is down"
      EOF
  run: |-
    docker run \
          -d \
          --name prometheus \
          --network {{NETWORK_NAME}} \
          -p 9090:9090 \
          -v ~/{{DATA_PATH}}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml \
          -v ~/{{DATA_PATH}}/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml \
          --restart=always \
          prom/prometheus:latest \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle
variables:
  - DATA_PATH
  - NETWORK_NAME
dependencies: []
