name: OpenClaw
description: AI agent gateway with CLI and web UI for Claude Code, OpenAI Codex, and more
commands:
  install:
    - docker pull ghcr.io/openclaw/openclaw:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/openclaw/config
    - mkdir -p ~/{{DATA_PATH}}/openclaw/workspace
    - docker volume create openclaw_config
    - docker volume create openclaw_workspace
  run: |-
    docker run \
          -d \
          --name openclaw-gateway \
          --network {{NETWORK_NAME}} \
          -p 18789:18789 \
          -p 18790:18790 \
          -e OPENCLAW_GATEWAY_BIND=lan \
          -e OPENCLAW_GATEWAY_TOKEN={{ADMIN_TOKEN}} \
          -e OPENCLAW_CONFIG_DIR=/home/node/.openclaw \
          -e OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace \
          -v openclaw_config:/home/node/.openclaw \
          -v openclaw_workspace:/home/node/.openclaw/workspace \
          ghcr.io/openclaw/openclaw:latest \
          node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
variables:
  - NETWORK_NAME
  - ADMIN_TOKEN
ports:
  - "18789:18789"
  - "18790:18790"
volumes:
  - openclaw_config:/home/node/.openclaw
  - openclaw_workspace:/home/node/.openclaw/workspace
environment:
  OPENCLAW_GATEWAY_BIND: "lan"
  OPENCLAW_GATEWAY_TOKEN: "{{ADMIN_TOKEN}}"
  OPENCLAW_CONFIG_DIR: "/home/node/.openclaw"
  OPENCLAW_WORKSPACE_DIR: "/home/node/.openclaw/workspace"
accessUrl: https://openclaw.{{DOMAIN}}
dependencies: []
isCore: false