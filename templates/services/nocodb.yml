name: NocoDB
description: Open-source Airtable alternative - Smart spreadsheet
commands:
  install:
    - docker pull nocodb/nocodb:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/nocodb/data
  run: |-
    docker run \
          -d \
          --name nocodb \
          --network {{NETWORK_NAME}} \
          -p 8018:8080 \
          -v ~/{{DATA_PATH}}/nocodb/data:/usr/app/data \
          --restart unless-stopped \
          nocodb/nocodb:latest
variables:
  - NETWORK_NAME
dependencies: []
