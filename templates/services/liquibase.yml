name: Liquibase
description: Database schema change management and version control
commands:
  install:
    - docker pull liquibase/liquibase:latest
  setup:
    - docker volume create liquibase_data
    - docker run --rm -v liquibase_data:/liquibase/changelog alpine sh -c "mkdir -p /liquibase/changelog/changelog && printf 'changelogFile=changelog/db.changelog.yaml\nurl=jdbc:postgresql://postgresql:5432/postgres\nusername=root\npassword=Admin26!\ndriver=org.postgresql.Driver\n' > /liquibase/changelog/liquibase.properties"
  run: |-
    docker run \
          -d \
          --name liquibase \
          --network {{NETWORK_NAME}} \
          -v liquibase_data:/liquibase/changelog \
          -e POSTGRES_PASSWORD={{STORAGE_PASSWORD}} \
          --restart=always liquibase/liquibase:latest \
          --classpath=/liquibase/changelog update --defaultsFile=/liquibase/changelog/liquibase.properties
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
dependencies: []
