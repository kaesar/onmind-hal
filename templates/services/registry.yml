name: Docker Registry
description: Private Docker container registry
commands:
  install:
    - docker pull registry:2
  setup:
    - mkdir -p ~/{{DATA_PATH}}/registry/data
    - mkdir -p ~/{{DATA_PATH}}/registry/auth
  run: |-
    docker run \
          -d \
          --name registry \
          --network {{NETWORK_NAME}} \
          -p 5000:5000 \
          -v ~/{{DATA_PATH}}/registry/data:/var/lib/registry \
          -e REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY=/var/lib/registry registry:2
variables:
  - NETWORK_NAME
dependencies: []
