name: Goose AI Agent
description: Open-source AI agent for code, workflows, and automation (AAIF/Linux Foundation)
commands:
  install:
    - docker pull ghcr.io/aaif-goose/goose:latest
  run: |-
    docker run -d \
      --name goose \
      --network {{NETWORK_NAME}} \
      -p 8300:8300 \
      -e GOOSE_HOST=0.0.0.0 \
      -e GOOSE_PORT=8300 \
      -e GOOSE_TLS=false \
      -e GOOSE_PROVIDER=ollama \
      -e GOOSE_MODEL=llama3 \
      -e OLLAMA_HOST=http://ollama:11434 \
      -e GOOSE_SERVER__SECRET_KEY={{ADMIN_TOKEN}} \
      --restart unless-stopped \
      ghcr.io/aaif-goose/goose:latest \
      goosed agent
variables:
  - NETWORK_NAME
  - ADMIN_TOKEN
ports:
  - "8300:8300"
environment:
  GOOSE_HOST: "0.0.0.0"
  GOOSE_PORT: "8300"
  GOOSE_TLS: "false"
  GOOSE_PROVIDER: "ollama"
  OLLAMA_HOST: "http://ollama:11434"
  GOOSE_SERVER__SECRET_KEY: "{{ADMIN_TOKEN}}"
accessUrl: https://goose.{{DOMAIN}}
dependencies: []
isCore: false
