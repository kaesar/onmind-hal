name: Semaphore UI
description: Modern UI for Ansible automation
commands:
  install:
    - docker pull semaphoreui/semaphore:latest
  setup:
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_roles WHERE rolname='semaphore'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE USER semaphore WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -c "ALTER USER semaphore WITH PASSWORD '{{STORAGE_PASSWORD}}';"
    - docker exec postgresql psql -U root -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='semaphore'" | grep -q 1 || docker exec postgresql psql -U root -d postgres -c "CREATE DATABASE semaphore OWNER semaphore;"
    - docker volume create semaphore_data
  run: |-
    docker rm -f semaphore 2>/dev/null; docker run \
          -d \
          --name semaphore \
          --network {{NETWORK_NAME}} \
          -p 3002:3000 \
          -v semaphore_data:/etc/semaphore \
          -e SEMAPHORE_DB_DIALECT=postgres \
          -e SEMAPHORE_DB_HOST=postgresql \
          -e SEMAPHORE_DB_PORT=5432 \
          -e SEMAPHORE_DB_USER=semaphore \
          -e SEMAPHORE_DB_PASS={{STORAGE_PASSWORD}} \
          -e SEMAPHORE_DB=semaphore \
          -e SEMAPHORE_ADMIN_PASSWORD=admin \
          -e SEMAPHORE_ADMIN_NAME=admin \
          -e SEMAPHORE_ADMIN_EMAIL=admin@localhost \
          -e SEMAPHORE_ADMIN=admin \
          --restart=always \
          semaphoreui/semaphore:latest
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
dependencies:
  - postgresql
