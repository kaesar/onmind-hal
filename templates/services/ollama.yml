name: Ollama LLM Server
description: Local large language model server
commands:
  install:
    - docker pull ollama/ollama:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/ollama/data
  run: |-
    docker run \
          -d \
          --name ollama \
          --network {{NETWORK_NAME}} \
          -p 11434:11434 \
          -v ~/{{DATA_PATH}}/ollama/data:/root/.ollama \
          ollama/ollama
variables:
  - NETWORK_NAME
dependencies: []
accessUrl: https://ollama.{{DOMAIN}}
