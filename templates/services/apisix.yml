name: Apache APISIX
description: Cloud-native API Gateway and microservices management
commands:
  install:
    - docker pull apache/apisix:latest
    - docker pull apache/apisix-dashboard:latest
    - docker pull bitnamilegacy/etcd:latest
  setup:
    - mkdir -p ~/{{CONFIG_PATH}}/apisix
    - chmod 777 ~/{{CONFIG_PATH}}/apisix
    - docker volume create apisix_data
    - docker volume create etcd_data
    - |-
      cat > ~/{{CONFIG_PATH}}/apisix/config.yaml << 'APISIX_EOF'
      apisix:
        node_listen: 9080
        enable_admin: true
        admin_key: admin
      deployment:
        role: traditional
        role_traditional:
          config_provider: etcd
        etcd:
          host:
            - http://etcd:2379
      APISIX_EOF
    - |-
      cat > ~/{{CONFIG_PATH}}/apisix/dashboard.yaml << 'DASHBOARD_EOF'
      conf:
        listen:
          host: 0.0.0.0
          port: 9000
      etcd:
        endpoints:
          - http://etcd:2379
      DASHBOARD_EOF
  run: |-
    docker run \
          -d \
          --name apisix-dashboard \
          --network {{NETWORK_NAME}} \
          -p 9180:9000 \
          -v ~/{{CONFIG_PATH}}/apisix/dashboard.yaml:/usr/local/apisix-dashboard/conf/conf.yaml \
          --restart unless-stopped \
          apache/apisix-dashboard:latest
variables:
  - NETWORK_NAME
dependencies: []
