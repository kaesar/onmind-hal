name: postgresql-service
description: PostgreSQL database service
commands:
  install:
    - docker pull pgvector/pgvector:pg17
  setup:
    - mkdir -p ~/{{DATA_PATH}}/postgresql/data
    - docker volume create postgres_data
  run: |-
    docker run \
          -d \
          --name postgresql \
          --network {{NETWORK_NAME}} \
          -p 5432:5432 \
          -e POSTGRES_DB=homelab \
          -e POSTGRES_USER=root \
          -e POSTGRES_PASSWORD={{STORAGE_PASSWORD}} \
          -v postgres_data:/var/lib/postgresql/data pgvector/pgvector:pg17
  postRun:
    - docker exec postgresql sh -c "apt-get update -qq && apt-get install -y -qq postgresql-17-cron postgresql-17-http 2>/dev/null"
    - docker exec postgresql sh -c "grep -q \"shared_preload_libraries.*pg_cron\" /var/lib/postgresql/data/postgresql.conf || echo \"shared_preload_libraries = 'pg_cron'\" >> /var/lib/postgresql/data/postgresql.conf"
    - docker exec postgresql sh -c "grep -q \"cron.database_name\" /var/lib/postgresql/data/postgresql.conf || echo \"cron.database_name = 'postgres'\" >> /var/lib/postgresql/data/postgresql.conf"
    - docker restart postgresql
    - sleep 5
    - docker exec postgresql psql -U root -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_cron;"
    - docker exec postgresql psql -U root -d postgres -c "CREATE EXTENSION IF NOT EXISTS http;"
    - docker exec postgresql psql -U root -d postgres -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
variables:
  - NETWORK_NAME
  - STORAGE_PASSWORD
ports:
  - "5432:5432"
volumes:
  - postgres_data:/var/lib/postgresql/data
environment:
  POSTGRES_DB: homelab
  POSTGRES_USER: root
  POSTGRES_PASSWORD: "{{STORAGE_PASSWORD}}"
accessUrl: postgresql://root:{{STORAGE_PASSWORD}}@{{IP}}:5432/homelab
dependencies: []
isCore: false
