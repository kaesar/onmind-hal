name: Consul
description: Service discovery and configuration (HashiCorp)
commands:
  install:
    - docker pull hashicorp/consul:latest
  setup:
    - mkdir -p ~/{{DATA_PATH}}/consul/data
  run: |-
    docker run \
          -d \
          --name consul \
          --network {{NETWORK_NAME}} \
          -p 8500:8500 \
          -v ~/{{DATA_PATH}}/consul/data:/consul/data \
          --restart unless-stopped \
          hashicorp/consul:latest agent \
          -server \
          -bootstrap-expect=1 \
          -ui \
          -client=0.0.0.0 \
          -data-dir=/consul/data
variables:
  - NETWORK_NAME
  - DATA_PATH
dependencies: []
