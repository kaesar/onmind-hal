# Reference: Cloudflare Tunnel ingress rules
# These routes match the services configured in Caddyfile.
# Configure them in Cloudflare Zero Trust Dashboard → Networks → Tunnels → Public Hostnames.
#
# Each route: hostname = subdomain.yourdomain.com → http://caddy:8080
# Caddy handles internal routing based on the Host header.

ingress:
